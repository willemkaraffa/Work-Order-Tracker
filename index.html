<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Work Order Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg0:#111;--bg1:#1c1c1c;--bg2:#262626;--bg3:#303030;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text0:#f0f0f0;--text1:#aaa;--text2:#555;--r:6px;--rlg:10px;--font:'DM Mono','Consolas','Courier New',monospace;--cellPadY:6px;--cellPadX:9px;--rowFs:11px;--baseFs:12px}
html.theme-light{--bg0:#fafafa;--bg1:#ffffff;--bg2:#f0f0f0;--bg3:#e0e0e0;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.18);--text0:#111;--text1:#555;--text2:#999}
html.density-compact{--cellPadY:3px;--cellPadX:6px;--rowFs:10.5px;--baseFs:11px}
html.density-roomy{--cellPadY:9px;--cellPadX:12px;--rowFs:12.5px;--baseFs:13px}
html,body{height:100%;background:var(--bg0);color:var(--text0);font-family:var(--font);font-size:var(--baseFs);-webkit-font-smoothing:antialiased;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;padding:10px 14px 8px;gap:8px;overflow:hidden}
.header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-left h1{font-size:15px;font-weight:600;letter-spacing:-.3px}
.header-left p{font-size:10px;color:var(--text1);margin-top:1px}
.header-right{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
button{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:var(--r);border:.5px solid var(--border2);background:var(--bg2);color:var(--text0);font-size:11px;font-family:var(--font);cursor:pointer;white-space:nowrap;transition:background .1s}
button:hover{background:var(--bg3)}
.btn-primary{background:var(--text0);color:var(--bg0);border-color:var(--text0);font-weight:600}
.btn-primary:hover{opacity:.88;background:var(--text0)}
.icon-btn{background:none;border:none;padding:2px 5px;color:var(--text1);font-size:13px;border-radius:4px}
.icon-btn:hover{background:var(--bg3);color:var(--text0)}
.icon-btn.del:hover{color:#ef4444;background:rgba(239,68,68,.15)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:5px;flex-shrink:0}
.stat-card{background:var(--bg1);border-radius:var(--r);padding:6px 9px;border:1.5px solid transparent}
.stat-label{font-size:9px;color:var(--text1);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat-value{font-size:17px;font-weight:700}
.tabs{display:flex;gap:4px;flex-shrink:0}
.tab{background:var(--bg1);color:var(--text1);border-color:var(--border);font-size:11px}
.tab.active{background:var(--text0);color:var(--bg0);border-color:var(--text0);font-weight:600}
.filters{background:var(--bg1);border:.5px solid var(--border);border-radius:var(--rlg);padding:7px 10px;flex-shrink:0}
.filter-row{display:flex;gap:5px;align-items:center}
.filter-row input[type=text]{flex:2;min-width:0}
.filter-row select{flex:1;min-width:0}
input[type=text],input[type=date],input[type=tel],select,textarea{padding:5px 7px;border-radius:var(--r);border:.5px solid var(--border2);background:var(--bg2)!important;color:var(--text0)!important;font-size:11px;font-family:var(--font);outline:none;-webkit-box-shadow:0 0 0 1000px #262626 inset!important;-webkit-text-fill-color:#f0f0f0!important}
input[type=text]:focus,input[type=date]:focus,input[type=tel]:focus,select:focus,textarea:focus{border-color:rgba(255,255,255,.32)}
select option{background:var(--bg2)}
.table-outer{background:var(--bg1);border:.5px solid var(--border);border-radius:var(--rlg);overflow:hidden;flex:1;display:flex;flex-direction:column;min-height:0}
.table-scroll{overflow-y:auto;overflow-x:auto;flex:1}
.table-scroll::-webkit-scrollbar{width:5px;height:5px}
.table-scroll::-webkit-scrollbar-track{background:transparent}
.table-scroll::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
table{border-collapse:collapse;white-space:nowrap;width:100%}
thead{position:sticky;top:0;z-index:2}
th{background:var(--bg2);padding:var(--cellPadY) var(--cellPadX);text-align:left;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text1);border-bottom:.5px solid var(--border);cursor:pointer;user-select:none}
th:hover{color:var(--text0)}
th.sort-active{color:var(--text0)}
td{padding:0;border-bottom:.5px solid var(--border);vertical-align:middle;font-size:var(--rowFs)}
.tdi{padding:var(--cellPadY) var(--cellPadX);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
tr:last-child td{border-bottom:none}
tr[data-priority]:hover td{filter:brightness(1.12)}
.editable{cursor:text}
.editable:hover .tdi{background:rgba(255,255,255,0.06);border-radius:4px}
.cell-in{width:100%;background:var(--bg3);color:var(--text0);border:1px solid rgba(255,255,255,.28);border-radius:4px;padding:3px 6px;font-size:11px;font-family:var(--font);outline:none}
.cell-sel{width:100%;background:var(--bg3);color:var(--text0);border:1px solid rgba(255,255,255,.28);border-radius:4px;padding:3px 4px;font-size:11px;font-family:var(--font);outline:none}
.addr-cell .tdi{min-width:150px;max-width:220px}
.addr-cell-inner{display:flex;align-items:center;gap:4px}
.addr-link{cursor:pointer;color:var(--text0);flex:1;overflow:hidden;text-overflow:ellipsis}
.addr-link:hover{color:#6ba8f7;text-decoration:underline}
.addr-edit-icon{cursor:pointer;color:var(--text2);font-size:11px;padding:0 4px;flex-shrink:0;opacity:0;transition:opacity .1s}
.addr-cell-inner:hover .addr-edit-icon{opacity:1}
.addr-edit-icon:hover{color:var(--text0)}
.phone-cell-inner{display:flex;align-items:center;gap:4px}
.phone-link{cursor:pointer;color:var(--text0);flex:1;overflow:hidden;text-overflow:ellipsis}
.phone-link:hover{color:#6ba8f7}
.phone-copied{color:#10b981!important}
.phone-edit-icon{cursor:pointer;color:var(--text2);font-size:11px;padding:0 4px;flex-shrink:0;opacity:0;transition:opacity .1s}
.phone-cell-inner:hover .phone-edit-icon{opacity:1}
.phone-edit-icon:hover{color:var(--text0)}
.status-cell-inner{display:flex;align-items:center;gap:4px}
.status-cycle{cursor:pointer}
.status-cycle:hover{filter:brightness(1.25)}
.status-edit-icon{cursor:pointer;color:var(--text2);font-size:10px;padding:0 4px;flex-shrink:0;opacity:0;transition:opacity .1s}
.status-cell-inner:hover .status-edit-icon{opacity:1}
.status-edit-icon:hover{color:var(--text0)}
.wo-flag{display:inline-block;font-size:13px;line-height:1;cursor:pointer;padding:0 2px;user-select:none}
.wo-flag-emerg{color:#ef4444}
.wo-flag-warranty{color:#1a73e8}
.wo-flag:hover{filter:brightness(1.3)}
#toast-host{position:fixed;bottom:18px;right:18px;z-index:99999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--bg3);color:var(--text0);border:.5px solid var(--border2);border-radius:6px;padding:7px 12px;font-size:11px;box-shadow:0 6px 20px rgba(0,0,0,.5);opacity:0;transform:translateY(8px);transition:opacity .15s,transform .15s;pointer-events:auto;max-width:340px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.err{border-color:rgba(239,68,68,.5);color:#fca5a5}
.toast.ok{border-color:rgba(16,185,129,.5);color:#6ee7b7}
.act-cell{display:flex;gap:2px;align-items:center;padding:0 5px;flex-wrap:nowrap}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap}
.date-fresh{color:#f0f0f0}
.date-warn{color:#f59e0b}
.date-urgent{color:#ef4444;font-weight:600}
.notes-wrap{display:inline-block}
.ni{color:var(--text2);font-size:12px;cursor:default;margin-left:3px}
.ni.on{color:#6ba8f7;cursor:pointer}
#gtooltip{display:none;position:fixed;z-index:99999;background:var(--bg3);border:.5px solid var(--border2);border-radius:7px;padding:9px 11px;max-width:300px;min-width:120px;font-size:11px;line-height:1.6;color:var(--text0);box-shadow:0 8px 28px rgba(0,0,0,.7);white-space:pre-wrap;word-break:break-word;pointer-events:none}
.inv-btn{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(107,168,247,.15);color:#6ba8f7;border:.5px solid rgba(107,168,247,.3)}
.inv-btn:hover{background:rgba(107,168,247,.28)}
.paid-btn{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(16,185,129,.15);color:#10b981;border:.5px solid rgba(16,185,129,.3)}
.paid-btn:hover{background:rgba(16,185,129,.28)}
.rev-btn{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(255,255,255,.07);color:var(--text1);border:.5px solid var(--border2)}
.rev-btn:hover{background:var(--bg3);color:var(--text0)}
.import-btn{font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(139,92,246,.18);color:#a78bfa;border:.5px solid rgba(139,92,246,.35)}
.import-btn:hover{background:rgba(139,92,246,.3)}
.sync-btn{font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(16,185,129,.15);color:#10b981;border:.5px solid rgba(16,185,129,.3)}
.sync-btn:hover{background:rgba(16,185,129,.28)}
.footer-bar{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;border-top:.5px solid var(--border);font-size:10px;color:var(--text1);flex-shrink:0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg1);border-radius:12px;padding:18px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;border:.5px solid var(--border2)}
.modal h2{font-size:13px;font-weight:600;margin-bottom:14px}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text1)}
.fg input,.fg select,.fg textarea{width:100%}
textarea{min-height:55px;resize:vertical}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.full{grid-column:1/-1}
.mact{display:flex;gap:6px;justify-content:flex-end;margin-top:14px;padding-top:10px;border-top:.5px solid var(--border)}
.mm{max-width:360px}
.mr{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:.5px solid var(--border);cursor:default}
.drag-handle{cursor:grab;color:var(--text2);font-size:14px;padding:0 2px;flex-shrink:0;user-select:none}
.drag-handle:active{cursor:grabbing}
.mr.drag-over{background:rgba(255,255,255,.06);border-radius:4px}
.mr:last-child{border-bottom:none}
.ar{display:flex;gap:6px;margin-top:10px;align-items:center}
.ar input[type=text]{flex:1}
input[type=color]{width:26px;height:24px;border:none;background:none;cursor:pointer;padding:0;border-radius:4px}
.import-item{background:var(--bg2);border-radius:6px;padding:8px 10px;margin-bottom:6px;border:1px solid var(--border2);cursor:pointer}
.import-item:hover{border-color:#a78bfa}
.import-item-warn{border-color:rgba(245,158,11,.55)}
.import-item-dup{font-size:10px;color:#f59e0b;margin-top:5px;padding-top:5px;border-top:.5px dashed rgba(245,158,11,.35)}
.import-force{color:#a78bfa;cursor:pointer;text-decoration:underline;margin-left:4px}
.import-force:hover{color:#c4b5fd}
.bulk-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:rgba(167,139,250,.12);border:.5px solid rgba(167,139,250,.35);border-radius:var(--r);margin-bottom:5px;flex-shrink:0;flex-wrap:wrap;font-size:11px}
.bulk-bar select{font-size:11px;padding:3px 6px}
.bulk-bar button{font-size:10px;padding:3px 8px}
.bulk-check-col{width:24px;padding:0 4px;text-align:center}
.bulk-check{accent-color:#a78bfa;cursor:pointer}
.col-hidden{display:none}
.sticky-wo th:first-child:not(.bulk-check-col),.sticky-wo td:first-child:not(.bulk-check-col){position:sticky;left:0;z-index:1;background:var(--bg1)}
.sticky-wo thead th:first-child:not(.bulk-check-col){z-index:3;background:var(--bg2)}
.sticky-wo.has-bulk th:nth-child(2),.sticky-wo.has-bulk td:nth-child(2){position:sticky;left:24px;z-index:1;background:var(--bg1)}
.sticky-wo.has-bulk thead th:nth-child(2){z-index:3;background:var(--bg2)}
.hist-row{display:flex;gap:10px;align-items:flex-start;padding:5px 7px;background:var(--bg2);border-radius:4px;border:.5px solid var(--border)}
.hist-ts{font-size:10px;color:var(--text2);min-width:110px;flex-shrink:0}
.hist-act{font-size:11px;color:var(--text0);flex:1;word-break:break-word}
.app.with-peek{display:grid;grid-template-columns:1fr 360px;grid-template-rows:auto auto auto auto auto 1fr;gap:8px}
.app.with-peek > .header{grid-column:1;grid-row:1}
.app.with-peek > .stats-grid{grid-column:1;grid-row:2}
.app.with-peek > .tabs{grid-column:1;grid-row:3}
.app.with-peek > .filters{grid-column:1;grid-row:4}
.app.with-peek > .bulk-bar{grid-column:1;grid-row:5}
.app.with-peek > .table-outer{grid-column:1;grid-row:6;min-height:0}
.peek-pane{grid-column:2;grid-row:1 / -1;background:var(--bg1);border:.5px solid var(--border);border-radius:var(--rlg);padding:12px 14px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;font-size:11px;min-height:0}
.peek-head{display:flex;align-items:center;gap:6px;justify-content:space-between;flex-wrap:wrap}
.peek-id{font-size:13px;font-weight:700}
.peek-actions{display:flex;gap:4px;align-items:center}
.peek-row{display:flex;flex-direction:column;gap:2px}
.peek-label{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
.peek-val{font-size:11px;color:var(--text0);word-break:break-word;white-space:pre-wrap}
.peek-link{color:#6ba8f7;cursor:pointer;text-decoration:underline}
.peek-link:hover{color:#93c5fd}
.peek-notes{background:var(--bg2);border:.5px solid var(--border);border-radius:5px;padding:8px 10px;min-height:60px;max-height:240px;overflow-y:auto;white-space:pre-wrap}
.peek-empty{color:var(--text2);text-align:center;padding:30px 10px;font-size:11px}
.peek-history-row{display:flex;gap:6px;padding:3px 0;border-bottom:.5px dotted var(--border);font-size:10px}
.peek-history-row:last-child{border-bottom:none}
.peek-history-ts{color:var(--text2);min-width:90px;flex-shrink:0}
.peek-history-act{color:var(--text0);flex:1;word-break:break-word}
.row-peeked{outline:1.5px solid #a78bfa;outline-offset:-2px}
.import-item-addr{font-size:11px;color:var(--text0);font-weight:600}
.import-item-meta{font-size:10px;color:var(--text1);margin-top:2px}
.import-check{float:right;margin-top:2px;accent-color:#a78bfa;width:14px;height:14px}
.update-banner{display:none;align-items:center;justify-content:space-between;padding:5px 14px;background:rgba(139,92,246,0.18);border-bottom:.5px solid rgba(139,92,246,0.35);flex-shrink:0;font-size:11px;color:#a78bfa}
.update-banner.show{display:flex}
.update-banner button{background:rgba(139,92,246,0.25);border:.5px solid rgba(139,92,246,0.5);color:#a78bfa;font-size:10px;padding:3px 10px}
.update-banner button:hover{background:rgba(139,92,246,0.4)}
</style>
</head>
<body>
<div id="update-banner" class="update-banner"><span id="update-msg">&#x2B06; Update available</span><button onclick="installUpdate()">Restart &amp; Install</button></div>
<div id="gtooltip"></div>
<div id="toast-host"></div>
<div class="app" id="app"></div>
<script>
const DSTATUSES=['Open','Bid Submitted','Bid Approved - Return','Parts Pending','Bid Approved - Complete','Pending-Complete','Closed'];
const DPRIORITIES=['High','Medium','Low','Warranty'];
const DTYPES=['HVAC','Plumbing','Electrical','Other'];
const DTECHS=['Daniel','Andrew','Devyn'];
const DPMS=[{name:'AMH',color:'#1a73e8'},{name:'MSR',color:'#10b981'},{name:'Other',color:'#6b7280'}];
const DSC={'Open':'#10b981','Bid Submitted':'#a0e114','Bid Approved - Return':'#db0a0a','Parts Pending':'#f59e0b','Bid Approved - Complete':'#a23ef4','Submitted for Invoice':'#0b55ea','Paid in Full':'#10b981','Pending-Complete':'#8b5cf6','Closed':'#4b5563'};
function displayStatus(o){if(!o)return'';if(o.tab==='invoiced')return'Submitted for Invoice';if(o.tab==='paid')return'Paid in Full';return o.status||'';}
const DPC={'High':'#ef4444','Medium':'#f59e0b','Low':'#10b981','Warranty':'#1a73e8'};
function SC(s){return S.statusColors&&S.statusColors[s]?S.statusColors[s]:(DSC[s]||'#6b7280');}
function PC(p){return S.priorityColors&&S.priorityColors[p]?S.priorityColors[p]:(DPC[p]||'#6b7280');}
const TC={'HVAC':'#f59e0b','Plumbing':'#1a73e8','Electrical':'#8b5cf6','Other':'#6b7280'};
const SAMPLE=[
  {id:'WO-001',pm:'AMH',type:'HVAC',address:'412 Hillcrest Dr, Durham, NC',phone:'',tech:'Daniel',status:'Open',priority:'High',notes:'Thermostat replaced.',dateCreated:'2025-04-21',tab:'active',deleted:false,propertyId:'',bidAmount:''},
  {id:'WO-002',pm:'MSR',type:'Plumbing',address:'88 Lakeview Ct, Raleigh, NC',phone:'',tech:'Andrew',status:'Parts Pending',priority:'High',notes:'Waiting on part.',dateCreated:'2025-04-14',tab:'active',deleted:false,propertyId:'',bidAmount:''},
];
function buildStatDefs(){
  const defs=[];
  S.statuses.forEach(s=>defs.push({label:s,color:SC(s),f:o=>!o.deleted&&o.tab==='active'&&o.status===s}));
  defs.push({label:'Invoiced',color:S.statusColors['Invoiced']||'#6ba8f7',f:o=>!o.deleted&&o.tab==='invoiced'});
  defs.push({label:'Paid',color:S.statusColors['Paid']||'#10b981',f:o=>!o.deleted&&o.tab==='paid'});
  S.priorities.forEach(p=>defs.push({label:p,color:PC(p),f:o=>!o.deleted&&o.priority===p}));
  return defs;
}

const DSETTINGS={
  keyFocusSearch:'/',
  keyFocusSearchCtrl:true,
  keyEscClearsSearch:true,
  autoFocusOnLaunch:true,
  globalHotkey:'CommandOrControl+Shift+W',
  autoSyncOnInvoice:true,
  autoSyncDebounceMs:4000,
  density:'comfortable',
  theme:'dark',
  hiddenCols:{active:[],invoiced:[],paid:[],trash:[]},
  stickyWoCol:true,
  workbookPath:'',
  warrantyDisplay:'flag'
};

const ALL_COLS=[
  {key:'id',label:'WO #'},
  {key:'propertyId',label:'Prop ID'},
  {key:'pm',label:'PM'},
  {key:'type',label:'Type'},
  {key:'address',label:'Address'},
  {key:'bidAmount',label:'Bid'},
  {key:'phone',label:'Phone'},
  {key:'tech',label:'Tech'},
  {key:'status',label:'Status'},
  {key:'dateCreated',label:'Date'}
];

let S={orders:[],pms:[...DPMS],statuses:[...DSTATUSES],priorities:[...DPRIORITIES],types:[...DTYPES],techs:[...DTECHS],
  statusColors:{...DSC},priorityColors:{...DPC},
  settings:{...DSETTINGS},
  presets:[],activePresetId:'',
  search:'',filterPM:'',filterType:'',filterStatus:'',filterPriority:'',
  sortKeys:[{col:'dateCreated',dir:'desc'}],
  view:'active',modal:null,editOrder:null,manageModal:null,newItemName:'',newItemColor:'#888888',editingCell:null,
  importItems:[],importSelected:new Set(),dragSrcType:null,dragSrcIdx:null,
  capturingHotkey:null,
  bulkMode:false,bulkSelected:new Set(),
  peekId:null,hoveredId:null};

const KEY='wo_data';
const OLD_KEYS=['wo_v4','wo_v3','wo_v2'];

const HISTORY_MAX=40;
function logHistory(id,action,detail){
  const i=S.orders.findIndex(o=>o.id===id);if(i<0)return;
  if(!Array.isArray(S.orders[i].history))S.orders[i].history=[];
  S.orders[i].history.push({ts:Date.now(),action,detail:detail||''});
  if(S.orders[i].history.length>HISTORY_MAX)S.orders[i].history=S.orders[i].history.slice(-HISTORY_MAX);
}
function fmtTs(ts){
  try{const d=new Date(ts);const m=d.getMonth()+1,dy=d.getDate(),y=String(d.getFullYear()).slice(2);
    let h=d.getHours(),mn=d.getMinutes();const ap=h>=12?'pm':'am';h=h%12||12;
    return `${m}/${dy}/${y} ${h}:${String(mn).padStart(2,'0')}${ap}`;}catch(e){return '';}
}

const UNDO_MAX=30;
const UNDO_STACK=[];
function snapshot(label){
  try{
    UNDO_STACK.push({label:label||'change',orders:JSON.parse(JSON.stringify(S.orders)),ts:Date.now()});
    if(UNDO_STACK.length>UNDO_MAX)UNDO_STACK.shift();
  }catch(e){}
}
function undo(){
  if(!UNDO_STACK.length){toast('Nothing to undo');return;}
  const prev=UNDO_STACK.pop();
  S.orders=prev.orders;
  save();render();

function formatPhone(v){
  if(!v)return'';
  const d=v.replace(/\D/g,'');
  if(d.length===10)return'('+d.slice(0,3)+')-'+d.slice(3,6)+'-'+d.slice(6);
  if(d.length===11&&d[0]==='1')return'('+d.slice(1,4)+')-'+d.slice(4,7)+'-'+d.slice(7);
  return v;
}

async function load(){

  try{const r=await window.storage.get(KEY);if(r&&r.value){const d=JSON.parse(r.value);['orders','pms','statuses','priorities','types','techs','statusColors','priorityColors','settings','presets'].forEach(k=>{if(d[k])S[k]=d[k];});loaded=true;}}catch(e){}
  if(!loaded){for(const ok of OLD_KEYS){try{const r=await window.storage.get(ok);if(r&&r.value){const d=JSON.parse(r.value);['orders','pms','statuses','priorities','types','techs','statusColors','priorityColors','settings','presets'].forEach(k=>{if(d[k])S[k]=d[k];});loaded=true;await window.storage.set(KEY,r.value);break;}}catch(e){}}}
  S.settings={...DSETTINGS,...(S.settings||{})};
  if(!S.settings.hiddenCols)S.settings.hiddenCols={active:[],invoiced:[],paid:[],trash:[]};
  ['active','invoiced','paid','trash'].forEach(t=>{if(!Array.isArray(S.settings.hiddenCols[t]))S.settings.hiddenCols[t]=[];});

    if(o.invoice&&!o.phone){o.phone=o.invoice;delete o.invoice;}
    if(!o.phone)o.phone='';

function fmtDate(d){if(!d)return'&#x2014;';const[y,m,dy]=d.split('-');return`${m}/${dy}/${y.slice(2)}`;}
function daysSince(d){if(!d)return 0;return Math.floor((Date.now()-new Date(d+'T00:00:00').getTime())/86400000);}
function dateClass(d){const n=daysSince(d);return n>=14?'date-urgent':n>=7?'date-warn':'date-fresh';}
function arrow(col){
  const idx=S.sortKeys.findIndex(k=>k.col===col);
  if(idx===-1)return'';
  const sym=S.sortKeys[idx].dir==='asc'?'&#x2191;':'&#x2193;';
  return S.sortKeys.length>1?` ${sym}${idx+1}`:` ${sym}`;
}

function filtered(){
  const v=S.view;
  let rows=v==='trash'?S.orders.filter(o=>o.deleted):S.orders.filter(o=>!o.deleted&&o.tab===v);
  if(S.search){
    const q=S.search.toLowerCase();
    const qDigits=S.search.replace(/\D/g,'');
    const isPhoneQuery=qDigits.length>=7;
    rows=rows.filter(o=>{
      if(isPhoneQuery){
        const pd=(o.phone||'').replace(/\D/g,'');
        if(pd&&pd.includes(qDigits))return true;
      }
      return ['id','address','city','tech','phone','pm','notes','propertyId'].some(k=>(o[k]||'').toLowerCase().includes(q));
    });
  }
  if(S.filterPM)rows=rows.filter(o=>o.pm===S.filterPM);
  if(S.filterType)rows=rows.filter(o=>o.type===S.filterType);
  if(S.filterStatus)rows=rows.filter(o=>o.status===S.filterStatus);
  if(S.filterPriority)rows=rows.filter(o=>o.priority===S.filterPriority);
  rows.sort((a,b)=>{
    for(const {col,dir} of S.sortKeys){
      const d=dir==='asc'?1:-1;
      if(col==='status'){
        let ai=S.statuses.indexOf(a.status),bi=S.statuses.indexOf(b.status);
        if(ai===-1)ai=9999;if(bi===-1)bi=9999;
        if(ai!==bi)return(ai-bi)*d;
      } else {
        const av=a[col]||'',bv=b[col]||'';
        if(av<bv)return-d;if(av>bv)return d;
      }
    }
    return 0;
  });
  return rows;
}

function sort(col,e){
  if(e&&e.shiftKey){
    const idx=S.sortKeys.findIndex(k=>k.col===col);
    if(idx===0){S.sortKeys[0].dir=S.sortKeys[0].dir==='asc'?'desc':'asc';}
    else if(idx>0){S.sortKeys.splice(idx,1);}
    else{S.sortKeys.push({col,dir:'desc'});}
  } else {
    if(S.sortKeys.length===1&&S.sortKeys[0].col===col){S.sortKeys[0].dir=S.sortKeys[0].dir==='asc'?'desc':'asc';}
    else{S.sortKeys=[{col,dir:'desc'}];}
  }
  render();
}

function captureHotkeyKey(e){
  e.preventDefault();e.stopPropagation();
  if(!S.capturingHotkey)return;
  if(e.key==='Escape'){cancelCaptureHotkey();return;}
  const k=e.key;
  if(['Control','Shift','Alt','Meta','OS','ContextMenu'].includes(k))return;
  const mods=[];
  if(e.ctrlKey||e.metaKey)mods.push('CommandOrControl');
  if(e.altKey)mods.push('Alt');
  if(e.shiftKey)mods.push('Shift');
  let main;
  if(k.length===1){main=k.toUpperCase();}
  else if(/^F\d{1,2}$/.test(k)){main=k;}
  else if(k===' '){main='Space';}
  else{main=k;}
  if(!mods.length){S.capturingHotkey=false;if(window.settingsBridge&&window.settingsBridge.resumeHotkey)window.settingsBridge.resumeHotkey();render();toast('Global hotkey requires a modifier (Ctrl/Alt/Shift)','err',3000);return;}
  const combo=[...mods,main].join('+');
  S.settings.globalHotkey=combo;S.capturingHotkey=false;save();
  if(window.settingsBridge)window.settingsBridge.setHotkey(combo);
  render();
}

  const cur=S.orders[i].status;
  const list=S.statuses;if(!list.length)return;
  let idx=list.indexOf(cur);
  if(idx===-1)idx=0;
  const dir=evt.shiftKey?-1:1;
  const next=list[(idx+dir+list.length)%list.length];
  snapshot('cycle status');
  const old=S.orders[i].status;
  S.orders[i].status=next;
  logHistory(id,'status',(old||'(empty)')+' → '+next);
  save();render();
}

function addItem(){

  if(S.manageModal==='pms'){if(!S.pms.find(p=>p.name===n))S.pms.push({name:n,color:S.newItemColor});}

  else if(S.manageModal==='priorities'){if(!S.priorities.includes(n)){S.priorities.push(n);S.priorityColors[n]=S.newItemColor;}}
  else if(S.manageModal==='types'){if(!S.types.includes(n))S.types.push(n);}

function removeItem(type,val){

  else if(type==='priorities'){S.priorities=S.priorities.filter(p=>p!==val);delete S.priorityColors[val];}
  else if(type==='types')S.types=S.types.filter(t=>t!==val);
  else if(type==='techs')S.techs=S.techs.filter(t=>t!==val);

let _dragType=null,_dragIdx=null;
function dragStart(e,type,i){_dragType=type;_dragIdx=i;e.dataTransfer.effectAllowed='move';}
function dragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';e.currentTarget.classList.add('drag-over');}
function dragLeave(e){e.currentTarget.classList.remove('drag-over');}
function dragDrop(e,type,targetIdx){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  if(_dragType!==type||_dragIdx===targetIdx||_dragIdx===null)return;
  if(type==='pms'){const[item]=S.pms.splice(_dragIdx,1);S.pms.splice(targetIdx,0,item);}
  else if(type==='statuses'){const[item]=S.statuses.splice(_dragIdx,1);S.statuses.splice(targetIdx,0,item);}
  else if(type==='priorities'){const[item]=S.priorities.splice(_dragIdx,1);S.priorities.splice(targetIdx,0,item);}
  else if(type==='types'){const[item]=S.types.splice(_dragIdx,1);S.types.splice(targetIdx,0,item);}
  else if(type==='techs'){const[item]=S.techs.splice(_dragIdx,1);S.techs.splice(targetIdx,0,item);}
  _dragType=null;_dragIdx=null;save();render();
}
function dragEnd(){_dragType=null;_dragIdx=null;document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));}

function toggleImportSelect(i){if(S.importSelected.has(i))S.importSelected.delete(i);else S.importSelected.add(i);render();}

function findDuplicate(item){
  const norm=s=>(s||'').toString().trim().toLowerCase().replace(/\s+/g,' ');
  const addr=norm(item.address);
  const pid=norm(item.propertyId);
  const ph=(item.phone||'').replace(/\D/g,'');
  for(const o of S.orders){
    if(o.deleted)continue;
    if(pid&&norm(o.propertyId)===pid)return {order:o,reason:'Property ID'};
    if(addr&&norm(o.address)===addr)return {order:o,reason:'Address'};
    if(ph&&ph.length>=10&&(o.phone||'').replace(/\D/g,'')===ph)return {order:o,reason:'Phone'};
  }
  return null;
}

function confirmImport(){
  const toImport=S.importItems.filter((_,i)=>S.importSelected.has(i));
  if(!toImport.length){toast('No items selected','',1800);return;}
  snapshot('import '+toImport.length+' order(s)');
  const existingNums=S.orders.map(o=>parseInt((o.id||'').replace(/[^0-9]/g,''))||0);
  let nextNum=Math.max(0,...existingNums)+1;
  let dupSkipped=0;
  toImport.forEach(item=>{
    if(!item.__forceImport){
      const dup=findDuplicate(item);
      if(dup){dupSkipped++;return;}
    }
    // Prefer the portal-supplied WO# (item.woId) for the tracker's id field;
    // fall back to a sequential WO-### if missing or already used.
    const portalWo=(item.woId||'').toString().trim();
    let woId='';
    if(portalWo&&!S.orders.find(o=>o.id===portalWo)){
      woId=portalWo;
    } else {
      woId='WO-'+String(nextNum++).padStart(3,'0');
    }
    const wo={id:woId,pm:item.pm||'',type:item.type||'Other',
      address:item.address||'',phone:formatPhone(item.phone||''),tech:item.tech||'',status:item.status||'Open',
      priority:item.priority||'Medium',notes:item.notes||'',
      dateCreated:item.dateCreated||new Date().toISOString().slice(0,10),
      tab:'active',deleted:false,propertyId:item.propertyId||'',bidAmount:item.bidAmount||'',
      dateOfService:item.dateOfService||'',portalLink:item.portalLink||'',city:item.city||'',
      emergency:!!item.emergency,warranty:!!item.warranty};
    if(wo.tech&&!S.techs.includes(wo.tech))S.techs.push(wo.tech);
    S.orders.push(wo);
  });
  window.storage.set('wo_extension_export','[]').catch(()=>{});
  save();S.modal=null;S.importItems=[];S.importSelected=new Set();render();
  const imported=toImport.length-dupSkipped;
  if(dupSkipped>0)toast('Imported '+imported+' · skipped '+dupSkipped+' duplicate(s)','ok',3500);
  else if(imported>0)toast('Imported '+imported+' work order'+(imported===1?'':'s'),'ok',2200);
}

function forceImportOne(idx){
  const item=S.importItems[idx];if(!item)return;
  item.__forceImport=true;
  S.importSelected.add(idx);
  render();
}

      <label>Warranty Display</label>
      <div style="display:flex;gap:6px">
        <button class="${(s.warrantyDisplay||'flag')==='flag'?'btn-primary':''}" onclick="setSetting('warrantyDisplay','flag')">Blue Flag Icon</button>
        <button class="${s.warrantyDisplay==='highlight'?'btn-primary':''}" onclick="setSetting('warrantyDisplay','highlight')">Row Highlight</button>
      </div>

      <label>Visible Columns (per tab)</label>

      <button onclick="resetSettings()">Reset to Defaults</button>
      <button onclick="closeModal()" class="btn-primary">Done</button>

  </div></div>`;

    <div class="fg"><label>PM / Client</label><select name="pm">${S.pms.map(p=>`<option${p.name===(o.pm||'')?' selected':''}>${esc(p.name)}</option>`).join('')}</select></div>

      </label>

function renderPeekPane(){
  const id=S.peekId;
  if(!id)return `<aside class="peek-pane"><div class="peek-empty">Hover a row and press Space to peek · Esc to close</div></aside>`;
  const o=S.orders.find(x=>x.id===id);
  if(!o)return `<aside class="peek-pane"><div class="peek-empty">WO not found</div></aside>`;
  const dispStatus=displayStatus(o);
  const sc=SC(dispStatus)||'#6b7280',pmc=pmColor(o.pm),tc=TC[o.type]||'#6b7280';
  const hist=(o.history||[]).slice().reverse().slice(0,12);
  const histHtml=hist.length?hist.map(e=>`<div class="peek-history-row"><div class="peek-history-ts">${esc(fmtTs(e.ts))}</div><div class="peek-history-act"><strong>${esc(e.action)}</strong>${e.detail?` — <span style="color:var(--text1)">${esc(e.detail)}</span>`:''}</div></div>`).join(''):'<div style="color:var(--text2);font-size:10px">No history yet</div>';
  return `<aside class="peek-pane">
    <div class="peek-head">
      <span class="peek-id">${esc(o.id)}</span>
      <div class="peek-actions">
        <button class="icon-btn" onclick="openEdit('${o.id}')" title="Edit">&#x270E;</button>
        <button class="icon-btn" onclick="clearPeek()" title="Close (Esc)">&#x2715;</button>
      </div>
    </div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">${badge(dispStatus,sc)}${o.emergency?'<span class="wo-flag wo-flag-emerg" title="Emergency">&#x2691;</span>':''}${o.warranty?'<span class="wo-flag wo-flag-warranty" title="Warranty">&#x2691;</span>':''}${o.pm?badge(o.pm,pmc):''}${o.type?badge(o.type,tc):''}</div>
    <div class="peek-row"><div class="peek-label">Address</div><div class="peek-val">${o.address?`<span class="peek-link" onclick="openMaps('${ea(o.address)}')" title="Open in Google Maps">${esc(o.address)}</span>`:'<span style="color:var(--text2)">—</span>'}</div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="peek-row"><div class="peek-label">Phone</div><div class="peek-val">${o.phone?`<span class="peek-link" onclick="copyPhone('${ea(o.phone)}',event)" title="Click to copy">${esc(o.phone)}</span>`:'<span style="color:var(--text2)">—</span>'}</div></div>
      <div class="peek-row"><div class="peek-label">Tech</div><div class="peek-val">${esc(o.tech)||'<span style="color:var(--text2)">—</span>'}</div></div>
      <div class="peek-row"><div class="peek-label">Property ID</div><div class="peek-val">${esc(o.propertyId)||'<span style="color:var(--text2)">—</span>'}</div></div>
      <div class="peek-row"><div class="peek-label">City</div><div class="peek-val">${esc(o.city)||'<span style="color:var(--text2)">—</span>'}</div></div>
      <div class="peek-row"><div class="peek-label">Bid</div><div class="peek-val">${esc(o.bidAmount)||'<span style="color:var(--text2)">—</span>'}</div></div>
      <div class="peek-row"><div class="peek-label">Created</div><div class="peek-val">${fmtDate(o.dateCreated)}</div></div>
      <div class="peek-row"><div class="peek-label">Service Date</div><div class="peek-val">${o.dateOfService?fmtDate(o.dateOfService):'<span style="color:var(--text2)">—</span>'}</div></div>
    </div>
    ${o.portalLink?`<div class="peek-row"><div class="peek-label">Portal</div><div class="peek-val"><span class="peek-link" onclick="if(window.shell)window.shell.openExternal('${ea(o.portalLink)}');else window.open('${ea(o.portalLink)}','_blank')">${esc(o.portalLink)}</span></div></div>`:''}
    <div class="peek-row"><div class="peek-label">Notes</div><div class="peek-notes">${o.notes?esc(o.notes):'<span style="color:var(--text2)">No notes</span>'}</div></div>
    <div class="peek-row"><div class="peek-label">Recent History</div><div>${histHtml}</div></div>
  </aside>`;
}

function render(){
  const rows=filtered();
  const v=S.view,isTrash=v==='trash',isInv=v==='invoiced',isPaid=v==='paid',isActive=v==='active';
  const trashCount=S.orders.filter(o=>o.deleted).length;
  const statsHtml=buildStatDefs().map(d=>`<div class="stat-card"><div class="stat-label">${d.label}</div><div class="stat-value" style="color:${d.color}">${S.orders.filter(d.f).length}</div></div>`).join('');

  const hidCls=k=>isColHidden(v,k)?' col-hidden':'';
  const tableRows=rows.map(o=>{
    const dispStatus=displayStatus(o);
    const sc=SC(dispStatus)||'#6b7280',tc=TC[o.type]||'#6b7280',pmc=pmColor(o.pm),dc=dateClass(o.dateCreated);
    const hasNotes=o.notes&&o.notes.trim().length>0;
    const notesIcon=`<span class="notes-wrap" onclick="event.stopPropagation()"><span class="ni${hasNotes?' on':''}" ${hasNotes?`data-notes="${ea(o.notes)}" onmouseenter="showNote(event,this.dataset.notes)" onmouseleave="hideNote()"`:''}>&#x1F4CB;</span></span>`;
    const warrantyHL=o.warranty&&(S.settings.warrantyDisplay==='highlight');
    const rowStyle=warrantyHL?'background:rgba(26,115,232,0.14)':'';
    const flagsHtml=`${o.emergency?`<span class="wo-flag wo-flag-emerg" title="Emergency — same-day/after-hours fee approved" onclick="event.stopPropagation();toggleFlag('${o.id}','emergency')">&#x2691;</span>`:''}${o.warranty&&S.settings.warrantyDisplay!=='highlight'?`<span class="wo-flag wo-flag-warranty" title="Warranty — parts/material under coverage" onclick="event.stopPropagation();toggleFlag('${o.id}','warranty')">&#x2691;</span>`:''}`;

    const bulkCell=S.bulkMode&&!isTrash?`<td class="bulk-check-col"><input type="checkbox" class="bulk-check" ${S.bulkSelected.has(o.id)?'checked':''} onclick="event.stopPropagation();bulkToggle('${o.id}')"></td>`:'';

    if(isTrash)return`<tr data-priority="${esc(o.priority)}" style="${rowStyle}">
      <td class="${hidCls('id')}"><div class="tdi"><strong>${esc(o.id)}</strong></div></td>
      <td class="${hidCls('propertyId')}"><div class="tdi">${esc(o.propertyId)||'<span style="color:var(--text2)">&#x2014;</span>'}</div></td>
      <td class="${hidCls('pm')}"><div class="tdi">${badge(o.pm,pmc)}</div></td>
      <td class="${hidCls('type')}"><div class="tdi">${badge(o.type,tc)}</div></td>
      <td class="addr-cell ${hidCls('address')}"><div class="tdi" title="${ea(o.address)}">${esc(o.address)}</div></td>
      <td class="${hidCls('bidAmount')}"><div class="tdi">${esc(o.bidAmount)||'<span style="color:var(--text2)">&#x2014;</span>'}</div></td>
      <td class="${hidCls('phone')}"><div class="tdi">${esc(o.phone)||'<span style="color:var(--text2)">&#x2014;</span>'}</div></td>
      <td class="${hidCls('tech')}"><div class="tdi">${esc(o.tech)||'<span style="color:var(--text2)">&#x2014;</span>'}</div></td>
      <td class="${hidCls('status')}"><div class="tdi">${badge(o.status,SC(o.status))}</div></td>
      <td class="${hidCls('dateCreated')}"><div class="tdi"><span class="${dc}">${fmtDate(o.dateCreated)}</span></div></td>
      <td><div class="act-cell"><button class="icon-btn" onclick="restore('${o.id}')" title="Restore">&#x21A9; Restore</button><button class="icon-btn del" onclick="hardDelete('${o.id}')" title="Delete permanently">&#x2715;</button></div></td>
    </tr>`;

    const woCell=edCell(o,'id',`<div style="display:flex;align-items:center;gap:4px"><strong>${esc(o.id)}</strong>${flagsHtml}${notesIcon}</div>`,'text');
    const propCell=edCell(o,'propertyId',esc(o.propertyId)||`<span style="color:var(--text2)">&#x2014;</span>`,'text');
    const pmCell=edCell(o,'pm',badge(o.pm,pmc),'sel-pm');
    const typeCell=edCell(o,'type',badge(o.type,tc),'sel-type');
    const addrInner=o.address?`<span class="addr-link" onclick="event.stopPropagation();openMaps('${ea(o.address)}')" title="Open in Google Maps">${esc(o.address)}</span><span class="addr-edit-icon" onclick="event.stopPropagation();startEdit('${o.id}','address')" title="Edit address">&#x270E;</span>`:`<span style="color:var(--text2)">&#x2014;</span>`;
    const addrEditing=S.editingCell&&S.editingCell.id===o.id&&S.editingCell.field==='address';
    const addrTd=addrEditing?edCell(o,'address',esc(o.address),'text').replace('<td ','<td class="addr-cell" ').replace('<td>','<td class="addr-cell">'):`<td class="addr-cell"><div class="tdi addr-cell-inner">${addrInner}</div></td>`;
    const bidCell=edCell(o,'bidAmount',esc(o.bidAmount)||`<span style="color:var(--text2)">&#x2014;</span>`,'text');
    const phoneEditing=S.editingCell&&S.editingCell.id===o.id&&S.editingCell.field==='phone';
    const phoneCell=phoneEditing?edCell(o,'phone',esc(o.phone)||`<span style="color:var(--text2)">&#x2014;</span>`,'text'):(o.phone?`<td><div class="tdi phone-cell-inner"><span class="phone-link" onclick="event.stopPropagation();copyPhone('${ea(o.phone)}',event)" title="Click to copy digits">${esc(o.phone)}</span><span class="phone-edit-icon" onclick="event.stopPropagation();startEdit('${o.id}','phone')" title="Edit">&#x270E;</span></div></td>`:`<td class="editable" onclick="startEdit('${o.id}','phone')"><div class="tdi"><span style="color:var(--text2)">&#x2014;</span></div></td>`);
    const techCell=edCell(o,'tech',esc(o.tech)||`<span style="color:var(--text2)">&#x2014;</span>`,'sel-tech');
    const statusEditing=S.editingCell&&S.editingCell.id===o.id&&S.editingCell.field==='status';
    const statusLocked=isInv||isPaid;
    const statusCell=statusLocked
      ?`<td><div class="tdi">${badge(dispStatus,sc)}</div></td>`
      :(statusEditing?edCell(o,'status',badge(o.status,sc),'sel-status'):`<td><div class="tdi status-cell-inner"><span class="status-cycle" onclick="event.stopPropagation();cycleStatus('${o.id}',event)" title="Click: next status · Shift+click: previous">${badge(o.status,sc)}</span><span class="status-edit-icon" onclick="event.stopPropagation();startEdit('${o.id}','status')" title="Pick from list">&#x25BE;</span></div></td>`);
    const dateCell=edCell(o,'dateCreated',`<span class="${dc}">${fmtDate(o.dateCreated)}</span>`,'date');

    let acts='';
    const histBtn=`<button class="icon-btn" onclick="openHistory('${o.id}')" title="View history">&#x231A;</button>`;
    if(isActive)acts=`<button class="inv-btn" onclick="sendToInvoiced('${o.id}')" title="Send to Invoiced">Invoice &#x2192;</button><button class="icon-btn" onclick="openEdit('${o.id}')" title="Edit">&#x270E;</button>${histBtn}<button class="icon-btn del" onclick="softDelete('${o.id}')" title="Trash">&#x1F5D1;</button>`;
    else if(isInv)acts=`<button class="paid-btn" onclick="sendToPaid('${o.id}')" title="Mark Paid">Paid &#x2192;</button><button class="rev-btn" onclick="sendToActive('${o.id}')" title="Back to Active">&#x2190; Active</button>${histBtn}<button class="icon-btn del" onclick="softDelete('${o.id}')" title="Trash">&#x1F5D1;</button>`;
    else if(isPaid)acts=`<button class="rev-btn" onclick="sendToInvoicedFromPaid('${o.id}')" title="Back to Invoiced">&#x2190; Invoice</button>${histBtn}<button class="icon-btn del" onclick="softDelete('${o.id}')" title="Trash">&#x1F5D1;</button>`;

    const wrap=(html,key)=>{
      if(!isColHidden(v,key))return html;
      if(/^<td\s+class="/.test(html)){return html.replace(/^<td\s+class="/,'<td class="col-hidden ');}
      return html.replace(/^<td(\s|>)/, '<td class="col-hidden"$1');
    };
    const woC=wrap(woCell,'id'),propC=wrap(propCell,'propertyId'),pmC=wrap(pmCell,'pm'),typeC=wrap(typeCell,'type'),addrC=wrap(addrTd,'address'),bidC=wrap(bidCell,'bidAmount'),phoneC=wrap(phoneCell,'phone'),techC=wrap(techCell,'tech'),statusC=wrap(statusCell,'status'),dateC=wrap(dateCell,'dateCreated');
    const peekedCls=S.peekId===o.id?' row-peeked':'';
    return`<tr data-priority="${esc(o.priority)}" data-id="${esc(o.id)}" class="${peekedCls.trim()}" style="${rowStyle}" onmouseenter="setHoveredRow('${o.id}')" onmouseleave="clearHoveredRow('${o.id}')">${bulkCell}${woC}${propC}${pmC}${typeC}${addrC}${bidC}${phoneC}${techC}${statusC}${dateC}<td><div class="act-cell">${acts}</div></td></tr>`;
  }).join('');

  const emptyMsg=isTrash?'Trash is empty':`No work orders in ${v}`;
  const viewTotal=S.orders.filter(o=>isTrash?o.deleted:(!o.deleted&&o.tab===v)).length;
  const sortHint=S.sortKeys.length>1?` &nbsp;&#x21C5; Shift+click header to multi-sort`:'&nbsp;&#x21C5; Shift+click column header to add sort';

  let modalHtml='';
  if(S.manageModal)modalHtml=renderManageModal();
  else if(S.modal==='import')modalHtml=renderImportModal();
  else if(S.modal==='settings')modalHtml=renderSettingsModal();
  else if(S.modal==='history')modalHtml=renderHistoryModal();
  else if(S.modal)modalHtml=renderOrderModal();

  const _prevSearch=document.getElementById('search-input');
  const _searchHadFocus=_prevSearch&&document.activeElement===_prevSearch;
  const _searchSelStart=_searchHadFocus?_prevSearch.selectionStart:null;
  const _searchSelEnd=_searchHadFocus?_prevSearch.selectionEnd:null;

  const appEl=document.getElementById('app');
  if(S.peekId)appEl.classList.add('with-peek');else appEl.classList.remove('with-peek');
  const peekHtml=S.peekId?renderPeekPane():'';

  appEl.innerHTML=`
    ${modalHtml}
    <div class="header">
      <div class="header-left"><h1>Work Order Tracker</h1><p>Gamble Plumbing Heating and Air &mdash; Raleigh/Durham</p></div>
      <div class="header-right">
        <button class="import-btn" onclick="checkForImports()">&#x1F4E5; Import from Extension</button>
        <button class="sync-btn" onclick="syncWorkbook()">&#x21BB; Sync Workbook</button>
        <button onclick="openSettings()">&#x2699; Settings</button>
        <button onclick="toggleBulkMode()" style="${S.bulkMode?'background:rgba(167,139,250,.25);border-color:rgba(167,139,250,.5);color:#a78bfa':''}">&#x2611; Bulk</button>
        <button onclick="togglePeek()" title="Open peek pane (hover row + Space · Esc to close)" style="${S.peekId?'background:rgba(167,139,250,.25);border-color:rgba(167,139,250,.5);color:#a78bfa':''}">&#x1F50D; Peek</button>
        <button onclick="exportCSV()">&#x2B07; CSV</button>
        <button class="btn-primary" onclick="openAdd()">+ Add Work Order</button>
      </div>
    </div>
    <div class="stats-grid">${statsHtml}</div>
    <div class="tabs">
      <button class="tab${v==='active'?' active':''}" onclick="S.view='active';render()">Active (${S.orders.filter(o=>!o.deleted&&o.tab==='active').length})</button>
      <button class="tab${v==='invoiced'?' active':''}" onclick="S.view='invoiced';render()">&#x1F4C4; Invoiced (${S.orders.filter(o=>!o.deleted&&o.tab==='invoiced').length})</button>
      <button class="tab${v==='paid'?' active':''}" onclick="S.view='paid';render()">&#x2705; Paid (${S.orders.filter(o=>!o.deleted&&o.tab==='paid').length})</button>
      <button class="tab${v==='trash'?' active':''}" onclick="S.view='trash';render()">&#x1F5D1; Trash (${trashCount})</button>
    </div>
    <div class="filters"><div class="filter-row">
      <input type="text" id="search-input" placeholder="Search WO#, address, tech, phone, PM, notes&hellip; (press / to focus)" value="${esc(S.search)}" oninput="S.search=this.value;S.activePresetId='';render()">
      <select onchange="S.filterPM=this.value;S.activePresetId='';render()"><option value="">All PMs</option>${S.pms.map(p=>`<option${S.filterPM===p.name?' selected':''}>${esc(p.name)}</option>`).join('')}</select>
      <select onchange="S.filterType=this.value;S.activePresetId='';render()"><option value="">All Types</option>${S.types.map(t=>`<option${S.filterType===t?' selected':''}>${esc(t)}</option>`).join('')}</select>
      <select onchange="S.filterStatus=this.value;S.activePresetId='';render()"><option value="">All Statuses</option>${S.statuses.map(s=>`<option${S.filterStatus===s?' selected':''}>${esc(s)}</option>`).join('')}</select>
      <select onchange="S.filterPriority=this.value;S.activePresetId='';render()"><option value="">All Priorities</option>${S.priorities.map(p=>`<option${S.filterPriority===p?' selected':''}>${esc(p)}</option>`).join('')}</select>
      <button onclick="S.search='';S.filterPM='';S.filterType='';S.filterStatus='';S.filterPriority='';S.activePresetId='';render()">Clear</button>
    </div>
    <div class="filter-row" style="margin-top:6px;gap:5px">
      <span style="font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px">Presets:</span>
      <select onchange="applyPreset(this.value)" style="flex:0 1 200px"><option value="">— Select —</option>${(S.presets||[]).map(p=>`<option value="${esc(p.id)}"${S.activePresetId===p.id?' selected':''}>${esc(p.name)}</option>`).join('')}</select>
      <button onclick="savePreset()" title="Save current filters as a new preset">+ Save</button>
      ${S.activePresetId?`<button onclick="updatePreset()" title="Overwrite current preset with current filters">Update</button><button class="icon-btn del" onclick="deletePreset('${esc(S.activePresetId)}')" title="Delete preset">&#x2715;</button>`:''}
    </div></div>
    ${S.bulkMode&&!isTrash?`<div class="bulk-bar">
      <strong>Bulk:</strong> <span>${S.bulkSelected.size} selected</span>
      <button onclick="bulkSelectAll()">Select all visible</button>
      <button onclick="bulkClear()">Clear</button>
      <span style="border-left:.5px solid var(--border2);height:14px;margin:0 4px"></span>
      <select onchange="if(this.value){bulkApply('status',this.value);this.value='';}"><option value="">Set status&hellip;</option>${S.statuses.map(s=>`<option>${esc(s)}</option>`).join('')}</select>
      <select onchange="if(this.value){bulkApply('priority',this.value);this.value='';}"><option value="">Set priority&hellip;</option>${S.priorities.map(p=>`<option>${esc(p)}</option>`).join('')}</select>
      <select onchange="bulkApply('tech',this.value);this.value='';"><option value="">Set tech&hellip;</option><option value="">— Unassigned —</option>${S.techs.map(t=>`<option>${esc(t)}</option>`).join('')}</select>
      <select onchange="if(this.value){bulkApply('pm',this.value);this.value='';}"><option value="">Set PM&hellip;</option>${S.pms.map(p=>`<option>${esc(p.name)}</option>`).join('')}</select>
      ${isActive?`<button class="inv-btn" onclick="bulkSendToInvoiced()">Invoice &#x2192;</button>`:''}
      <button class="icon-btn del" onclick="bulkDelete()">&#x1F5D1; Trash</button>
      <span style="margin-left:auto"></span>
      <button onclick="toggleBulkMode()">Exit bulk mode</button>
    </div>`:''}
    <div class="table-outer">
      <div class="table-scroll"><table class="${S.settings&&S.settings.stickyWoCol?'sticky-wo':''} ${S.bulkMode&&!isTrash?'has-bulk':''}">
        <thead><tr>
          ${S.bulkMode&&!isTrash?`<th class="bulk-check-col"><input type="checkbox" class="bulk-check" ${rows.length>0&&S.bulkSelected.size===rows.length?'checked':''} onclick="bulkSelectAll()" title="Select all visible"></th>`:''}
          <th onclick="sort('id',event)" class="${S.sortKeys.find(k=>k.col==='id')?'sort-active':''} ${isColHidden(v,'id')?'col-hidden':''}" style="min-width:110px">WO #${arrow('id')}</th>
          <th onclick="sort('propertyId',event)" class="${S.sortKeys.find(k=>k.col==='propertyId')?'sort-active':''} ${isColHidden(v,'propertyId')?'col-hidden':''}" style="min-width:80px">Prop ID${arrow('propertyId')}</th>
          <th onclick="sort('pm',event)" class="${S.sortKeys.find(k=>k.col==='pm')?'sort-active':''} ${isColHidden(v,'pm')?'col-hidden':''}" style="min-width:55px">PM${arrow('pm')}</th>
          <th onclick="sort('type',event)" class="${S.sortKeys.find(k=>k.col==='type')?'sort-active':''} ${isColHidden(v,'type')?'col-hidden':''}" style="min-width:80px">Type${arrow('type')}</th>
          <th onclick="sort('address',event)" class="${S.sortKeys.find(k=>k.col==='address')?'sort-active':''} ${isColHidden(v,'address')?'col-hidden':''}" style="min-width:155px">Address${arrow('address')}</th>
          <th onclick="sort('bidAmount',event)" class="${S.sortKeys.find(k=>k.col==='bidAmount')?'sort-active':''} ${isColHidden(v,'bidAmount')?'col-hidden':''}" style="min-width:70px">Bid${arrow('bidAmount')}</th>
          <th onclick="sort('phone',event)" class="${S.sortKeys.find(k=>k.col==='phone')?'sort-active':''} ${isColHidden(v,'phone')?'col-hidden':''}" style="min-width:110px">Phone${arrow('phone')}</th>
          <th onclick="sort('tech',event)" class="${S.sortKeys.find(k=>k.col==='tech')?'sort-active':''} ${isColHidden(v,'tech')?'col-hidden':''}" style="min-width:78px">Tech${arrow('tech')}</th>
          <th onclick="sort('status',event)" class="${S.sortKeys.find(k=>k.col==='status')?'sort-active':''} ${isColHidden(v,'status')?'col-hidden':''}" style="min-width:130px">Status${arrow('status')}</th>
          <th onclick="sort('dateCreated',event)" class="${S.sortKeys.find(k=>k.col==='dateCreated')?'sort-active':''} ${isColHidden(v,'dateCreated')?'col-hidden':''}" style="min-width:70px">Date${arrow('dateCreated')}</th>
          <th style="min-width:${isActive?'185px':isInv?'190px':isPaid?'135px':'95px'}"></th>
        </tr></thead>
        <tbody>${tableRows||`<tr><td colspan="${S.bulkMode&&!isTrash?12:11}" style="text-align:center;padding:28px;color:var(--text2)">${emptyMsg}</td></tr>`}</tbody>
      </table></div>
      <div class="footer-bar">
        <span>
          ${v.charAt(0).toUpperCase()+v.slice(1)} &middot; Showing ${rows.length} of ${viewTotal} &middot;
          Row color: <span style="color:#ef4444">&#x25A0;</span> High &nbsp;<span style="color:#f59e0b">&#x25A0;</span> Medium &nbsp;<span style="color:#10b981">&#x25A0;</span> Low &nbsp;<span style="color:#6ba8f7">&#x25A0;</span> Warranty &middot;
          <span style="color:#f0f0f0">&#x25A0;</span> &lt;1wk <span style="color:#f59e0b">&#x25A0;</span> 1&ndash;2wk <span style="color:#ef4444">&#x25A0;</span> 2wk+ date &middot;${sortHint}
        </span>
      </div>
    </div>
    ${peekHtml}`;

  if(_searchHadFocus){
    const el=document.getElementById('search-input');
    if(el){
      el.focus();
      try{el.setSelectionRange(_searchSelStart,_searchSelEnd);}catch(e){}
    }
  }
}

if(window.extensionBridge){
  window.extensionBridge.onImport(function(orders){
    if(!orders||!orders.length)return;
    S.importItems=orders;S.importSelected=new Set(orders.map((_,i)=>i));S.modal='import';render();
    if(window.extensionBridge)window.extensionBridge.acknowledge();
  });
}

if(window.updater){
  window.updater.onStatus(function(data){
    const banner=document.getElementById('update-banner');const msg=document.getElementById('update-msg');
    if(!banner||!msg)return;
    if(data.status==='available'){msg.textContent='⬆ Update v'+data.version+' downloading…';banner.classList.add('show');}
    else if(data.status==='downloading'){msg.textContent='⬆ Downloading update… '+data.percent+'%';banner.classList.add('show');}
    else if(data.status==='ready'){msg.textContent='✓ Update v'+data.version+' ready — restart to install';banner.classList.add('show');}
    else{banner.classList.remove('show');}
  });
}
function installUpdate(){if(window.updater)window.updater.install();}

function toast(msg,kind,ms){
  const host=document.getElementById('toast-host');if(!host)return;
  const el=document.createElement('div');
  el.className='toast'+(kind?' '+kind:'');el.textContent=msg;
  host.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),200);},ms||2200);
}

function focusSearch(){
  const el=document.getElementById('search-input');
  if(el){el.focus();el.select();}
}

document.addEventListener('paste',function(e){
  const t=e.target;if(!t||t.tagName!=='INPUT')return;
  const isPhone=t.name==='phone'||t.type==='tel';
  if(!isPhone)return;
  const text=(e.clipboardData&&e.clipboardData.getData('text'))||'';
  const formatted=formatPhone(text);
  if(formatted&&formatted!==text){
    e.preventDefault();
    const start=t.selectionStart||0,end=t.selectionEnd||0;
    const cur=t.value||'';
    t.value=cur.slice(0,start)+formatted+cur.slice(end);
    try{t.setSelectionRange(start+formatted.length,start+formatted.length);}catch(_){}
    t.dispatchEvent(new Event('input',{bubbles:true}));
  }
});

// Keyboard shortcuts: configurable focus-search key + Ctrl+F + Esc clear + Ctrl+Z undo
document.addEventListener('keydown',function(e){
  if(S.capturingHotkey){captureHotkeyKey(e);return;}
  const tag=(e.target&&e.target.tagName)||'';
  const inField=tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT';
  if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.key.toLowerCase()==='z'&&!inField){e.preventDefault();undo();return;}
  if(e.key===' '&&!inField&&!S.modal){e.preventDefault();peekHovered();return;}
  if(e.key==='Escape'&&!inField&&S.peekId&&!S.modal){e.preventDefault();clearPeek();return;}
  if(S.settings.keyFocusSearchCtrl&&(e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();focusSearch();return;}
  const fk=S.settings.keyFocusSearch||'/';
  if(e.key===fk&&!inField){e.preventDefault();focusSearch();return;}
  if(S.settings.keyEscClearsSearch&&e.key==='Escape'&&e.target&&e.target.id==='search-input'){
    if(S.search){S.search='';render();setTimeout(focusSearch,0);}
    else{e.target.blur();}
  }
});

if(window.focusSearchBridge){window.focusSearchBridge.on(focusSearch);}

load();
setTimeout(()=>{if(S.settings&&S.settings.autoFocusOnLaunch)focusSearch();},400);
</script>
</body>
