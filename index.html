<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="darkreader-lock" />
<meta name="color-scheme" content="dark light" />
<title>Trade Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&display=swap" />
<!-- Leaflet (Maps module). OpenStreetMap tiles via OSM's free public CDN.
     No API key, no signup, no billing. Loaded from unpkg CDN. -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #1c1c1e; overflow: hidden; }
  body { font-family: 'IBM Plex Sans', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  button { font-family: inherit; outline: none; -webkit-tap-highlight-color: transparent; }
  button:focus { outline: none; }
  button:focus-visible { outline: 2px solid var(--accent, #6a92c4); outline-offset: 2px; }
  div { -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 6px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }
  ::-webkit-scrollbar-track { background: transparent; }
  .addr-link { cursor: pointer; }
  .addr-link:hover { text-decoration: underline; text-underline-offset: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="./bundle/app.js"></script>
</body>
</html>
